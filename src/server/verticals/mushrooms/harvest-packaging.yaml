vertical: mushrooms
version: 3
name: harvest_packaging_flow
description: >
  Harvest-to-shipment operations. Barcodes are a special item type
  representing the physical label. An operation assigns a barcode item
  to a product item, after which scanning the barcode resolves to
  the product it represents.

# ── Workflow ─────────────────────────────────────────────────────────
#
# 1. Office batch-creates barcode items (item type: barcode, status: printed).
#    Each barcode item has an identifier (the barcode value) and optionally
#    an assigned_to user (the packer).
#
# 2. Workers place a barcode label into each box as they pack.
#    No scanning, no devices — purely physical.
#
# 3. QA scans the barcode. This runs the "harvest" operation:
#    - A new packaged_product item is created (status: approved)
#    - The barcode item is linked to the product via lineage (labels)
#    - The barcode item transitions from "printed" → "assigned"
#    - The operator provides the grow room and harvest date
#
# 4. From this point on, scanning the barcode resolves to the
#    packaged_product item it labels (impersonation via lineage).
#
# 5. If a barcode is never scanned, it stays in "printed" status —
#    visible as unaccounted inventory.
# ─────────────────────────────────────────────────────────────────────

item_types:
  - key: packaged_product
    name: Packaged Product
    category: product
    default_uom: each
    track_lineage: true
    typical_identifiers:
      - barcode
    attributes:
      - harvester
      - species
      - grow_room
      - harvest_date
    state_model:
      states: [printed, approved, rejected, shipped]
      initial_state: approved
      terminal_states: [shipped, rejected]
      transitions:
        printed:
          allowed_to: [approved, rejected]
        approved:
          allowed_to: [shipped, rejected]
        rejected:
          allowed_to: []
        shipped:
          allowed_to: []

  - key: skid
    name: Skid
    category: logistics
    default_uom: each
    track_lineage: true
    typical_identifiers:
      - barcode
      - lot_code
    attributes:
      - destination
      - carrier
      - ship_date
    state_model:
      states: [building, staged, shipped, delivered]
      initial_state: building
      terminal_states: [delivered]
      transitions:
        building:
          allowed_to: [staged]
        staged:
          allowed_to: [shipped]
        shipped:
          allowed_to: [delivered]
        delivered:
          allowed_to: []

# ── Barcode resolution ──────────────────────────────────────────────
#
# When a barcode is scanned, the system:
#   1. Finds the barcode item by identifier value
#   2. If status is "assigned", follows the "labels" lineage link
#      to the target item and returns that item (impersonation)
#   3. If status is "printed", returns the barcode item itself
#      (available for assignment via an operation)
# ─────────────────────────────────────────────────────────────────────

operation_types:
  # ─────────────────────────────────────────────────────────────────
  # HARVEST — scan a barcode, create a product, link them
  # ─────────────────────────────────────────────────────────────────
  - key: harvest
    name: Harvest
    description: >
      Scan a printed barcode item. The operation creates a new
      packaged_product item, links the barcode to it, and records
      the grow room and harvest date.

    inputs:
      items:
        - key: packaged_good
          item_type: packaged_good
          scan: barcode
          required: true
          qty: { min: 1 }
          preconditions:
            status: [printed]

      fields:
        composte_number:
          description: Grow room the product was harvested from
          type: item
          required: true
        harvest_date:
          description: Date the mushrooms were harvested
          type: date
          required: true
          default: today
        species:
          description: Species of mushrooms harvested
          type: string
          required: true

    steps:
      - name: Mark package as approved
        action: set-status
        target: packaged_good
        value: approved

      - name: Record pasteurization details
        action: set-attributes
        target: packaged_good
        attributes:
          grow_room: { from: inputs.grow_room }
          harvest_date: { from: inputs.harvest_date }

  # ─────────────────────────────────────────────────────────────────
  # PACKAGE — scan assigned barcodes (resolving to products) onto a skid
  # ─────────────────────────────────────────────────────────────────
  - key: package
    name: Package onto Skid
    description: >
      Scan barcodes that have been assigned to approved products,
      then link those products onto a skid for shipment.
    inputs:
      items:
        - key: boxes
          item_type: packaged_product
          scan: barcode
          resolve: true
          required: true
          qty: { min: 1 }
          preconditions:
            status: [approved]
        - key: skid
          item_type: skid
          scan: barcode
          required: true
          qty: { min: 1, max: 1 }

      fields:
        destination:
          description: Where this skid is being shipped to
          type: string
          required: false

    steps:
      - name: Link products to skid
        action: link
        with:
          children: boxes
          parent: skid
          relationship: on_skid

      - name: Mark products as shipped
        action: set-status
        target: boxes
        value: shipped
