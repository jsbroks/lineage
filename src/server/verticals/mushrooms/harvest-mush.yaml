locations:
  - name: "Harvest Room #1"
    icon: Warehouse

  - name: "Harvest Room #2"
    icon: Warehouse

  - name: "Harvest Room #3"
    icon: Warehouse

  - name: "Harvest Room #4"
    icon: Warehouse

  - name: "Harvest Room #5"
    icon: Warehouse

  - name: "Harvest Room #6"
    icon: Warehouse
    category: Logistics

  - name: "Cold Storage"
    icon: Freezer

  - name: "QA Room"
    icon: Warehouse

lots:
  - name: Mushroom Box
    icon: Mushroom
    category: Product
    color: Green
    codePrefix: Box
    quantity:
      unit: lb
      name: Weight
    variants:
      - name: Type
        options:
          - Portobello
          - Cremini
          - Button
    variantDefaults:
      - match: { Type: Portobello }
        set:
          value: 1299
          valueCurrency: CAD
          quantity: 3
          attributes:
            My Property: Value
      - match: { Type: Cremini }
        set:
          value: 1099
          valueCurrency: CAD
          quantity: 5
          attributes:
            My Property: Value
      - match: { Type: Button }
        set:
          value: 999
          valueCurrency: CAD
          quantity: 5
          attributes:
            My Property: Value

    initialStatus: Created
    status:
      - name: Created
        to: [Approved, Discarded]
        category: unstarted
      - name: Approved
        to: [Discarded, Shipped, Discarded]
        category: in_progress
      - name: Shipped
        to: [Discarded]
        category: done
      - name: Discarded
        category: canceled
    customAttributes:
      - name: Harvest By
        type: string
      - name: Harvest On
        type: date
      - name: Harvest Room
        type: string
        options:
          - "Harvest Room #1"
          - "Harvest Room #2"
          - "Harvest Room #3"
          - "Harvest Room #4"
          - "Harvest Room #5"
          - "Harvest Room #6"

  - name: Skid
    icon: Truck
    color: Neutral
    category: Logistics
    codePrefix: SKID
    initialStatus: Created
    status:
      - name: Created
        to: [Ready]
        category: unstarted
      - name: Ready
        to: [Staged]
        category: in_progress
      - name: Staged
        to: [Shipped]
        category: in_progress
      - name: Discarded
        category: canceled
    customAttributes:
      - name: Destination
        type: string
      - name: Carrier
        type: string
      - name: Ship Date
        type: date

operations:
  - name: Harvested
    description: Record a harvest event for one or more mushroom boxes

    inputs:
      - key: mushroomBoxes
        type: lots
        lotType: Mushroom Box
        min: 1
        preconditions:
          status: [Created]
      - key: Harvest By
        type: string
        required: false
        description: "Required if not already set on all boxes."
      - key: Harvest On
        type: date
        required: false
      - key: Harvest Room
        type: location

    steps:
      - name: Harvest Mushroom Box
        action: set-lot
        target: mushroomBoxs
        value:
          status: Approved
          attributes:
            Harvest By: { from: [inputs, Harvest By], keepExisting: true }
            Harvest On:
              from: [inputs, Harvest On, format: date]
              keepExisting: true
            Harvest Room:
              from: [inputs, Harvest Room, name]
              keepExisting: true

      - name: Set Operation locations
        action: set-operation
        value:
          location: { from: [inputs, Harvest Room] }

  - name: Build Skid
    description: Add boxes to a skid for shipment

    inputs:
      - key: mushroomBoxes
        type: lots
        lotType: Mushroom Box
        min: 1
        preconditions:
          status: [Approved]
      - key: skid
        type: lots
        lotType: Skid
        min: 1
        max: 1
        preconditions:
          status: [Ready]
      - key: Customer
        type: string
      - key: Ship Date
        type: date

    steps:
      - name: Set Skid Status
        action: set-lot
        target: skid
        value:
          status: Shipped
          attributes:
            Customer: { from: [inputs, Customer] }
            Ship Date: { from: [inputs, Ship Date] }

      - name: Link Mushroom Boxes to Skid
        action: set-lineage
        with:
          from: mushroomBoxes
          to: skid
          relationship: On Skid
